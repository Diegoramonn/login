<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de rotas </title>
    <style>
        body{

            background: #f4f4f4;
            padding: 20px;
        }
        h1{

        }
        .container{

            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            margin: auto;

        input{
            width:100%;
            padding: 10px;

        }
        button{

            background: #27ae60;
            color: white;
            border: none;

        button:hover{

        }
        table{
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;

        th, td{

            padding: 8px;
            text-align: center;
        }
        th{

    </style>
</head>
<body>

</html>
